<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Sort Game - Economics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        query,
        orderBy,
        serverTimestamp,
        getDocs,
        deleteDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
      import {
        getAuth,
        signInAnonymously,
        signInWithCustomToken,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

      const firebaseConfig = JSON.parse(__firebase_config);
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const appId =
        typeof __app_id !== "undefined" ? __app_id : "group-sort-economics";

      window.db = db;
      window.auth = auth;
      window.appId = appId;
      window.firestoreRefs = {
        collection,
        addDoc,
        onSnapshot,
        query,
        orderBy,
        serverTimestamp,
        getDocs,
        deleteDoc,
        doc,
      };

      const initAuth = async () => {
        try {
          if (
            typeof __initial_auth_token !== "undefined" &&
            __initial_auth_token
          ) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch (error) {
          console.error("Auth initialization failed:", error);
        }
      };

      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.startLeaderboardListener();
        }
      });

      initAuth();
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#007AFF",
              secondary: "#34C759",
              accent: "#FF9500",
              destructive: "#FF3B30",
            },
          },
        },
        darkMode: "class",
      };
    </script>
    <style>
      .group-sort-item {
        transition: all 0.3s ease;
        user-select: none;
        touch-action: none;
      }
      .correct-placement {
        border: 2px solid #34c759 !important;
        background-color: rgba(52, 199, 89, 0.1) !important;
        cursor: default !important;
      }
      .incorrect-placement {
        border: 2px solid #ff3b30 !important;
        animation: shake 0.4s ease-in-out;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }
      .dropzone-active {
        border-color: #007aff !important;
        background-color: rgba(0, 122, 255, 0.05);
      }
    </style>
  </head>
  <body
    class="p-4 sm:p-8 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen"
  >
    <div class="max-w-6xl mx-auto">
      <!-- Màn hình nhập tên -->
      <div
        id="auth-screen"
        class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/80 backdrop-blur-sm"
      >
        <div
          class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md"
        >
          <h2 class="text-2xl font-bold mb-6 text-center text-primary">
            Nhập thông tin học sinh
          </h2>
          <input
            type="text"
            id="student-name"
            placeholder="Nhập họ và tên của bạn..."
            class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg mb-4 bg-transparent focus:ring-2 focus:ring-primary outline-none"
          />
          <button
            id="start-btn"
            class="w-full py-3 bg-primary text-white font-bold rounded-lg hover:opacity-90 transition-all"
          >
            Bắt đầu làm bài
          </button>
        </div>
      </div>

      <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-primary mb-2">Group Sort Game</h1>
        <p
          id="user-display"
          class="text-gray-600 dark:text-gray-400 font-medium italic"
        ></p>
      </header>

      <!-- Layout chính: Game (Trái) & Bảng vàng (Phải) -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
        <!-- KHU VỰC GAME -->
        <div
          id="game-content"
          class="lg:col-span-2 opacity-50 pointer-events-none transition-opacity"
        >
          <div
            id="activity-container"
            class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700"
          >
            <div
              id="personal-result"
              class="hidden mb-6 p-6 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl text-center"
            >
              <h2
                class="text-xl font-bold text-green-600 dark:text-green-400 mb-1"
              >
                Chúc mừng bạn đã hoàn thành!
              </h2>
              <p class="text-gray-700 dark:text-gray-300">
                Thời gian làm bài:
                <span id="time-spent" class="font-bold text-primary"
                  >00:00</span
                >
              </p>
            </div>

            <div
              id="categories-grid"
              class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"
            ></div>

            <div
              id="items-pool-container"
              class="p-4 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700/50"
            >
              <h3
                class="text-center text-xs font-bold mb-3 text-gray-500 uppercase tracking-widest"
              >
                Danh sách từ cần phân loại:
              </h3>
              <div
                id="items-pool"
                class="flex flex-wrap justify-center gap-2 min-h-[60px]"
              ></div>
            </div>

            <div
              class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700 flex justify-center gap-4"
            >
              <button
                id="check-btn"
                class="px-8 py-2.5 bg-secondary text-white font-semibold rounded-lg shadow-md hover:opacity-90 transition-all active:scale-95"
              >
                Kiểm tra kết quả
              </button>
              <button
                id="finish-btn"
                class="hidden px-8 py-2.5 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:opacity-90 transition-all active:scale-95"
              >
                Hoàn thành & Lưu kết quả
              </button>
            </div>
          </div>
        </div>

        <!-- BẢNG VÀNG LỚP HỌC (Luôn hiển thị) -->
        <div
          id="leaderboard-section"
          class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 h-fit"
        >
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold flex items-center gap-2">
              <span class="text-accent text-xl">🏆</span>
              Bảng vàng lớp học
            </h2>
          </div>

          <div
            class="overflow-hidden rounded-xl border border-gray-100 dark:border-gray-700"
          >
            <table class="w-full text-left bg-white dark:bg-gray-800 text-sm">
              <thead class="bg-gray-50 dark:bg-gray-700/50 text-gray-500">
                <tr>
                  <th class="p-3 font-bold uppercase text-[10px]">Hạng</th>
                  <th class="p-3 font-bold uppercase text-[10px]">Tên</th>
                  <th class="p-3 font-bold uppercase text-[10px] text-right">
                    Giờ nộp
                  </th>
                </tr>
              </thead>
              <tbody id="leaderboard-body">
                <tr>
                  <td
                    colspan="3"
                    class="p-8 text-center text-gray-400 italic text-xs"
                  >
                    Đang tải dữ liệu...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div
            class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700 flex justify-end"
          >
            <button
              id="clear-data-btn"
              class="text-[9px] text-gray-400 hover:text-destructive flex items-center gap-1 transition-colors uppercase font-bold tracking-tighter"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3 h-3"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                />
              </svg>
              Xóa dữ liệu lớp
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal xác nhận xóa -->
    <div
      id="confirm-modal"
      class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/50 backdrop-blur-sm"
    >
      <div
        class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4 text-center text-gray-900 dark:text-gray-100"
      >
        <h3 class="text-lg font-bold mb-2">Xác nhận xóa?</h3>
        <p class="text-sm text-gray-500 mb-4">
          Nhập mật khẩu quản trị viên để làm mới toàn bộ bảng danh sách.
        </p>
        <input
          type="password"
          id="admin-password"
          placeholder="••••••••"
          class="w-full p-3 border rounded-lg mb-2 text-center focus:ring-2 focus:ring-destructive outline-none bg-gray-50 dark:bg-gray-900"
        />
        <p
          id="password-error"
          class="text-xs text-destructive mb-4 hidden font-bold text-red-500"
        >
          Mật khẩu sai!
        </p>
        <div class="flex gap-2">
          <button
            id="cancel-clear"
            class="flex-1 py-2 text-sm bg-gray-100 dark:bg-gray-700 rounded-lg"
          >
            Hủy
          </button>
          <button
            id="confirm-clear"
            class="flex-1 py-2 text-sm bg-destructive text-white rounded-lg"
          >
            Xóa hết
          </button>
        </div>
      </div>
    </div>

    <script>
      const rawData = {
        categories: [
          { id: "cat-0", name: "Banking and Tax" },
          { id: "cat-1", name: "Import and Export" },
          { id: "cat-2", name: "Market Issues" },
        ],
        items: [
          { id: "item-0", text: "Assets", categoryId: "cat-0" },
          { id: "item-1", text: "Tax avoidance", categoryId: "cat-0" },
          { id: "item-2", text: "Financial records", categoryId: "cat-0" },
          { id: "item-a1", text: "Interest rate", categoryId: "cat-0" },
          { id: "item-a2", text: "Tax deductible", categoryId: "cat-0" },
          { id: "item-a3", text: "Tax deduction", categoryId: "cat-0" },
          { id: "item-a4", text: "Collateral", categoryId: "cat-0" },
          { id: "item-a5", text: "Revenue", categoryId: "cat-0" },
          { id: "item-3", text: "Customs", categoryId: "cat-1" },
          { id: "item-4", text: "Certificate of origin", categoryId: "cat-1" },
          { id: "item-5", text: "Cargo", categoryId: "cat-1" },
          { id: "item-b1", text: "Tariff", categoryId: "cat-1" },
          { id: "item-b2", text: "Trade deficit", categoryId: "cat-1" },
          { id: "item-b3", text: "Quota", categoryId: "cat-1" },
          { id: "item-b4", text: "Logistics", categoryId: "cat-1" },
          { id: "item-b5", text: "Embargo", categoryId: "cat-1" },
          { id: "item-6", text: "Freeze assets", categoryId: "cat-2" },
          { id: "item-7", text: "Lift sanctions", categoryId: "cat-2" },
          { id: "item-8", text: "Economic recession", categoryId: "cat-2" },
          { id: "item-c1", text: "Retaliation", categoryId: "cat-2" },
          { id: "item-c2", text: "Market saturation", categoryId: "cat-2" },
          { id: "item-c3", text: "Consumer behavior", categoryId: "cat-2" },
          { id: "item-c4", text: "Price fluctuation", categoryId: "cat-2" },
          { id: "item-c5", text: "Competitiveness", categoryId: "cat-2" },
        ],
      };

      const ADMIN_PASSWORD = "01026018";
      let draggedItem = null;
      let currentUser = null;
      let startTime = null;

      function shuffle(array) {
        return [...array].sort(() => Math.random() - 0.5);
      }

      window.startLeaderboardListener = function () {
        const { db, firestoreRefs, appId, auth } = window;
        if (!auth.currentUser) return;

        const { collection, query, orderBy, onSnapshot } = firestoreRefs;
        const q = query(
          collection(db, "artifacts", appId, "public", "data", "completions"),
          orderBy("completedAt", "asc"),
        );

        onSnapshot(
          q,
          (snapshot) => {
            const tbody = document.getElementById("leaderboard-body");
            if (snapshot.empty) {
              tbody.innerHTML =
                '<tr><td colspan="3" class="p-8 text-center text-gray-400 text-xs italic">Chưa có ai nộp bài.</td></tr>';
              return;
            }

            tbody.innerHTML = "";
            snapshot.docs.forEach((doc, index) => {
              const data = doc.data();
              const date = data.completedAt?.toDate?.() || new Date();
              const timeStr = date.toLocaleTimeString("vi-VN", {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
              });

              const isMe = currentUser && data.name === currentUser;
              const row = `
                        <tr class="border-b dark:border-gray-700/50 transition-colors ${isMe ? "bg-primary/10" : ""}">
                            <td class="p-3">
                                <span class="flex items-center justify-center w-6 h-6 rounded font-bold text-[10px] 
                                    ${index === 0 ? "bg-yellow-400 text-white" : index === 1 ? "bg-gray-300 text-white" : index === 2 ? "bg-orange-400 text-white" : "bg-gray-100 dark:bg-gray-700 text-gray-400"}">
                                    ${index + 1}
                                </span>
                            </td>
                            <td class="p-3 font-medium ${isMe ? "text-primary" : ""}">
                                ${data.name}
                            </td>
                            <td class="p-3 text-right text-[10px] text-gray-400 font-mono">${timeStr}</td>
                        </tr>
                    `;
              tbody.innerHTML += row;
            });
          },
          (error) => console.error("Leaderboard error:", error),
        );
      };

      const modal = document.getElementById("confirm-modal");
      const pwdInput = document.getElementById("admin-password");
      const pwdError = document.getElementById("password-error");

      document.getElementById("clear-data-btn").onclick = () => {
        pwdInput.value = "";
        pwdError.classList.add("hidden");
        modal.classList.remove("hidden");
      };

      document.getElementById("cancel-clear").onclick = () =>
        modal.classList.add("hidden");

      document.getElementById("confirm-clear").onclick = async () => {
        if (pwdInput.value !== ADMIN_PASSWORD) {
          pwdError.classList.remove("hidden");
          return;
        }

        const { db, firestoreRefs, appId, auth } = window;
        if (!auth.currentUser) return;
        const { collection, getDocs, deleteDoc, doc } = firestoreRefs;

        document.getElementById("confirm-clear").disabled = true;
        document.getElementById("confirm-clear").innerText = "...";

        try {
          const querySnapshot = await getDocs(
            collection(db, "artifacts", appId, "public", "data", "completions"),
          );
          const deletePromises = querySnapshot.docs.map((d) =>
            deleteDoc(
              doc(
                db,
                "artifacts",
                appId,
                "public",
                "data",
                "completions",
                d.id,
              ),
            ),
          );
          await Promise.all(deletePromises);
          modal.classList.add("hidden");
        } catch (err) {
          console.error("Clear error:", err);
        } finally {
          document.getElementById("confirm-clear").disabled = false;
          document.getElementById("confirm-clear").innerText = "Xóa hết";
        }
      };

      document.getElementById("start-btn").onclick = () => {
        const name = document.getElementById("student-name").value.trim();
        if (name) {
          currentUser = name;
          startTime = Date.now();
          document.getElementById("auth-screen").style.display = "none";
          document
            .getElementById("game-content")
            .classList.remove("opacity-50", "pointer-events-none");
          document.getElementById("user-display").innerText =
            `Học sinh: ${name}`;
          initApp();
        }
      };

      function initApp() {
        const categoriesGrid = document.getElementById("categories-grid");
        const itemsPool = document.getElementById("items-pool");

        categoriesGrid.innerHTML = rawData.categories
          .map(
            (cat) => `
                <div class="flex flex-col h-full bg-gray-50 dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700">
                    <div class="p-2 text-center font-bold text-primary border-b border-gray-200 dark:border-gray-700 uppercase text-[9px] tracking-widest">
                        ${cat.name}
                    </div>
                    <div class="dropzone flex-grow p-3 min-h-[140px] space-y-2" data-category-id="${cat.id}"></div>
                </div>
            `,
          )
          .join("");

        const shuffledItems = shuffle(rawData.items);
        itemsPool.innerHTML = shuffledItems
          .map(
            (item) => `
                <div class="group-sort-item p-2.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm cursor-grab text-xs font-medium"
                     draggable="true"
                     id="${item.id}"
                     data-item-id="${item.id}"
                     data-correct-id="${item.categoryId}">
                    ${item.text}
                </div>
            `,
          )
          .join("");

        setupEventListeners();
      }

      function setupEventListeners() {
        attachItemEvents(document.querySelectorAll(".group-sort-item"));
        const dropzones = document.querySelectorAll(".dropzone, #items-pool");

        dropzones.forEach((zone) => {
          zone.addEventListener("dragover", (e) => {
            e.preventDefault();
            if (zone.classList.contains("dropzone"))
              zone.classList.add("dropzone-active");
          });
          zone.addEventListener("dragleave", () =>
            zone.classList.remove("dropzone-active"),
          );
          zone.addEventListener("drop", (e) => {
            e.preventDefault();
            zone.classList.remove("dropzone-active");
            if (
              draggedItem &&
              !draggedItem.classList.contains("correct-placement")
            ) {
              draggedItem.classList.remove("incorrect-placement");
              zone.appendChild(draggedItem);
            }
          });
        });

        document.getElementById("check-btn").onclick = checkAnswers;
        document.getElementById("finish-btn").onclick = handleFinish;
      }

      function attachItemEvents(items) {
        items.forEach((item) => {
          item.addEventListener("dragstart", (e) => {
            draggedItem = item;
            item.classList.add("opacity-50", "scale-95");
          });
          item.addEventListener("dragend", () => {
            item.classList.remove("opacity-50", "scale-95");
            draggedItem = null;
          });
        });
      }

      function checkAnswers() {
        const checkBtn = document.getElementById("check-btn");
        const finishBtn = document.getElementById("finish-btn");
        const items = document.querySelectorAll(
          ".group-sort-item:not(.correct-placement)",
        );
        const pool = document.getElementById("items-pool");
        let anyIncorrect = false;
        let allPlaced = true;

        checkBtn.disabled = true;

        items.forEach((item) => {
          const parentZone = item.closest(".dropzone");
          if (!parentZone) {
            allPlaced = false;
            return;
          }
          const currentCatId = parentZone.dataset.categoryId;
          const correctCatId = item.dataset.correctId;

          if (currentCatId === correctCatId) {
            item.classList.add("correct-placement");
            item.setAttribute("draggable", "false");
          } else {
            item.classList.add("incorrect-placement");
            anyIncorrect = true;
          }
        });

        if (anyIncorrect || !allPlaced) {
          setTimeout(() => {
            items.forEach((item) => {
              if (item.classList.contains("incorrect-placement")) {
                item.classList.remove("incorrect-placement");
                pool.appendChild(item);
              }
            });
            checkBtn.disabled = false;
          }, 800);
        } else {
          const totalCorrect =
            document.querySelectorAll(".correct-placement").length;
          if (totalCorrect === rawData.items.length) {
            checkBtn.classList.add("hidden");
            finishBtn.classList.remove("hidden");
          } else {
            checkBtn.disabled = false;
          }
        }
      }

      async function handleFinish() {
        const { db, firestoreRefs, appId, auth } = window;
        if (!auth.currentUser) return;
        const { collection, addDoc, serverTimestamp } = firestoreRefs;

        const endTime = Date.now();
        const diff = endTime - startTime;
        const minutes = Math.floor(diff / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        const durationStr = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;

        document.getElementById("finish-btn").disabled = true;
        document.getElementById("finish-btn").innerText = "...";

        try {
          await addDoc(
            collection(db, "artifacts", appId, "public", "data", "completions"),
            {
              userId: auth.currentUser.uid,
              name: currentUser,
              completedAt: serverTimestamp(),
              duration: durationStr,
            },
          );

          document.getElementById("finish-btn").classList.add("hidden");
          document.getElementById("personal-result").classList.remove("hidden");
          document.getElementById("time-spent").innerText = durationStr;
        } catch (err) {
          console.error("Save error:", err);
          document.getElementById("finish-btn").disabled = false;
          document.getElementById("finish-btn").innerText =
            "Hoàn thành & Lưu kết quả";
        }
      }
    </script>
  </body>
</html>
